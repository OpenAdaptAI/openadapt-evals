# Simple 2-step task: open Notepad and type "Hello World"
name: "Open Notepad and type Hello World"
id: custom-notepad-hello

setup:
  - execute: "powershell -c 'Stop-Process -Name notepad -Force -ErrorAction SilentlyContinue'"
  - execute: "powershell -c 'Stop-Process -Name msedge -Force -ErrorAction SilentlyContinue'"
  - execute: "powershell -c 'Remove-Item $env:USERPROFILE\\Desktop\\*.txt -Force -ErrorAction SilentlyContinue'"
  - sleep: 1

evaluate:
  # Use notepad* wildcard to match both classic Notepad and Windows 11 modern Notepad
  - check: command
    run: "powershell -c \"Get-Process notepad* -ErrorAction SilentlyContinue | Measure | Select -ExpandProperty Count\""
    expect: "1"
    match: contains

  - check: screenshot
    description: "A Notepad window (classic or modern Windows 11 style) is open with 'Hello World' typed in the text area"

combine: and
max_steps: 10

milestones:
  - name: "Notepad is open"
    check: command
    # Wildcard catches both classic 'notepad' and Win11 'Notepad' process names
    run: "powershell -c \"Get-Process notepad* -ErrorAction SilentlyContinue | Measure | Select -ExpandProperty Count\""
    expect: "1"
    match: contains

  - name: "Text is typed"
    check: screenshot
    description: "Notepad shows 'Hello World' in the text area"
